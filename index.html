<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ลงทะเบียนกิจกรรม บวชจิตบวชใจ "งดเหล้าเข้าพรรษา" ๒๕๖๙</title>
  
  <!-- ฟอนต์สารบรรณ (Sarabun) -->
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Flatpickr CSS สำหรับปฏิทิน -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  
  <!-- SweetAlert2 CSS สำหรับ Popup สวยๆ -->
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">

  <style>
    :root {
      --primary-color: #e65100; /* สีส้มจีวร */
      --secondary-color: #ff9800;
      --bg-color: #fdfbfb;
      --text-color: #333;
    }
    
    body {
      font-family: 'Sarabun', sans-serif;
      background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
      color: var(--text-color);
      margin: 0;
      padding: 0;
    }

    .header-banner {
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      color: white;
      text-align: center;
      padding: 40px 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    
    .header-banner h1 { margin: 0; font-size: 2rem; }
    .header-banner p { margin-top: 10px; font-size: 1.1rem; opacity: 0.9; }

    .container {
      max-width: 800px;
      margin: -30px auto 40px;
      padding: 0 20px;
      position: relative;
      z-index: 10;
    }

    /* --- ส่วนของ Dashboard สถิติ --- */
    .dashboard {
      background: white;
      border-radius: 15px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
      margin-bottom: 30px;
    }
    .stats-title { font-size: 1.2rem; color: #555; }
    .stats-number { font-size: 4rem; font-weight: bold; color: var(--primary-color); line-height: 1; margin: 10px 0; }
    .stats-unit { font-size: 1.2rem; color: #777; }

    /* --- ส่วนของข้อความวิ่ง (Marquee) --- */
    .marquee-container {
      width: 100%;
      overflow: hidden;
      background: #fff8e1;
      padding: 12px 0;
      border-radius: 50px;
      margin-top: 20px;
      border: 1px solid #ffe082;
      display: none; /* ซ่อนไว้ก่อนจนกว่าจะโหลดข้อมูลสำเร็จ */
    }
    .marquee-content {
      display: flex;
      animation: scroll-left 25s linear infinite;
      white-space: nowrap;
    }
    .vow-item {
      margin-right: 40px;
      padding: 5px 20px;
      background: white;
      border-radius: 30px;
      color: var(--primary-color);
      font-weight: 600;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .vow-item span { color: #555; font-weight: normal; }
    @keyframes scroll-left {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-150%); }
    }
    .marquee-container:hover .marquee-content { animation-play-state: paused; }

    /* --- ส่วนของฟอร์มลงทะเบียน --- */
    .form-container {
      background: white;
      border-radius: 15px;
      padding: 40px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
    }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: #444; }
    .form-control {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
      font-family: 'Sarabun', sans-serif;
      box-sizing: border-box;
      transition: border-color 0.3s;
    }
    .form-control:focus { border-color: var(--primary-color); outline: none; }
    textarea.form-control { resize: vertical; min-height: 100px; }
    
    .btn-submit {
      width: 100%;
      padding: 15px;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      font-family: 'Sarabun', sans-serif;
      transition: background 0.3s;
    }
    .btn-submit:hover { background: #cc4800; }
    .btn-submit:disabled { background: #ccc; cursor: not-allowed; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <!-- ส่วนหัว -->
  <div class="header-banner">
    <h1>🙏 บวชจิตบวชใจ "งดเหล้าเข้าพรรษา"</h1>
    <p>กิจกรรมทำความดีด้วยหัวใจ ประจำปี พ.ศ.๒๕๖๙ (ปีที่ ๕)<br>โดย กลุ่มกฎหมายและคดี สพป.สุรินทร์ เขต 3</p>
  </div>

  <div class="container">
    
    <!-- กระดานสถิติ & ข้อความวิ่ง -->
    <div class="dashboard">
      <div class="stats-title">ผู้ร่วมตั้งสัจจะอธิษฐานแล้ว</div>
      <div class="stats-number" id="counter">0</div>
      <div class="stats-unit">ท่าน</div>

      <div class="marquee-container" id="marqueeBox">
        <div class="marquee-content" id="vowList">
          <!-- ข้อมูลจาก Sheet จะถูกโหลดมาใส่ตรงนี้ -->
        </div>
      </div>
    </div>

    <!-- ฟอร์มลงทะเบียน -->
    <div class="form-container">
      <h2 style="text-align: center; color: var(--primary-color); margin-top: 0;">ฟอร์มตั้งสัจจะอธิษฐาน</h2>
      <form id="vowForm">
        
        <div class="grid-2">
          <div class="form-group">
            <label>คำนำหน้าชื่อ <span style="color:red;">*</span></label>
            <select class="form-control" name="prefix" required>
              <option value="" disabled selected>เลือกคำนำหน้า...</option>
              <option value="นาย">นาย</option>
              <option value="นาง">นาง</option>
              <option value="นางสาว">นางสาว</option>
              <option value="ว่าที่ ร.ต.">ว่าที่ ร.ต.</option>
              <option value="ว่าที่ ร.ต.หญิง">ว่าที่ ร.ต.หญิง</option>
            </select>
          </div>
          <div class="form-group">
            <label>ชื่อ - นามสกุล <span style="color:red;">*</span></label>
            <input type="text" class="form-control" name="fullName" placeholder="เช่น สมชาย ใจดี" required>
          </div>
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label>อีเมล (E-mail) <span style="color:red;">*</span></label>
            <input type="email" class="form-control" name="email" placeholder="สำหรับรับเกียรติบัตร" required>
          </div>
          <div class="form-group">
            <label>ตำแหน่ง <span style="color:red;">*</span></label>
            <input type="text" class="form-control" name="position" placeholder="เช่น ครู, นิติกร, บุคคลทั่วไป" required>
          </div>
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label>โรงเรียน / หน่วยงาน (ถ้ามี)</label>
            <input type="text" class="form-control" name="organization" placeholder="ชื่อหน่วยงานที่สังกัด">
          </div>
          <div class="form-group">
            <label>ปัจจุบันอยู่จังหวัด <span style="color:red;">*</span></label>
            <input type="text" class="form-control" name="province" placeholder="เช่น สุรินทร์" required>
          </div>
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label>เคยร่วมกิจกรรมนี้กับ สพป.สุรินทร์ เขต 3 กี่ครั้ง? <span style="color:red;">*</span></label>
            <select class="form-control" name="history" required>
              <option value="1">1 ครั้ง (เพิ่งร่วมปีนี้ปีแรก)</option>
              <option value="2">2 ครั้ง</option>
              <option value="3">3 ครั้ง</option>
              <option value="4">4 ครั้ง</option>
              <option value="5">5 ครั้ง (ร่วมมาตลอด)</option>
            </select>
          </div>
          <div class="form-group">
            <label>ระยะเวลาที่ประสงค์จะงดเหล้า <span style="color:red;">*</span></label>
            <select class="form-control" name="duration" required>
              <option value="ตลอดเข้าพรรษา (3 เดือน)">ตลอดเข้าพรรษา (3 เดือน)</option>
              <option value="1 เดือน">1 เดือน</option>
              <option value="เฉพาะวันพระ">เฉพาะวันพระ</option>
              <option value="งดตลอดชีวิต">งดตลอดชีวิต</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>วันที่เริ่มต้นตั้งสัจจะอธิษฐาน <span style="color:red;">*</span></label>
          <input type="text" id="startDate" class="form-control" name="startDate" placeholder="เลือกวันที่ (วว/ดด/ปปปป)" required>
        </div>

        <div class="form-group">
          <label>ความคาดหวัง หรือเหตุผลที่เข้าร่วมกิจกรรม <span style="color:red;">*</span></label>
          <textarea class="form-control" name="expectation" placeholder="เช่น เพื่อสุขภาพที่ดี, เพื่อเป็นแบบอย่างที่ดีแก่นักเรียน" required></textarea>
        </div>

        <div class="form-group">
          <label>ความพึงพอใจต่อการจัดกิจกรรมออนไลน์ <span style="color:red;">*</span></label>
          <select class="form-control" name="satisfaction" required>
            <option value="มากที่สุด">มากที่สุด</option>
            <option value="มาก">มาก</option>
            <option value="ปานกลาง">ปานกลาง</option>
            <option value="น้อย">น้อย</option>
          </select>
        </div>

        <div class="form-group">
          <label>ข้อเสนอแนะเพิ่มเติม (ถ้ามี)</label>
          <textarea class="form-control" name="suggestion" placeholder="พิมพ์ข้อเสนอแนะ..."></textarea>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">🙏 ยืนยันการตั้งสัจจะอธิษฐาน</button>
      </form>
    </div>
  </div>

  <!-- นำเข้า Flatpickr JS และภาษาไทย -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://npmcdn.com/flatpickr/dist/l10n/th.js"></script>
  
  <!-- นำเข้า SweetAlert2 JS -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script>
    // ==========================================
    // 1. ใส่ URL ของ Web App ที่ได้จาก Google Apps Script
    // ==========================================
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw-8KNUUoPBnfLTo1sgPGYOg9w_QRgnlZzpVSvVLGeE5w5v-5ZyKCG87pfxH2HO6jRz/exec'; 

    // ==========================================
    // 2. ตั้งค่า Flatpickr (แปลง ค.ศ. เป็น พ.ศ.)
    // ==========================================
    flatpickr("#startDate", {
      locale: "th",
      dateFormat: "d/m/Y",
      allowInput: true,
      defaultDate: new Date(),
      formatDate: (date, format, locale) => {
          const day = date.getDate().toString().padStart(2, '0');
          const month = (date.getMonth() + 1).toString().padStart(2, '0');
          const yearBE = date.getFullYear() + 543;
          return `${day}/${month}/${yearBE}`;
      }
    });

    // ==========================================
    // 3. ฟังก์ชันดึงข้อมูลสถิติและข้อความวิ่ง
    // ==========================================
    async function fetchStats() {
      if(SCRIPT_URL === 'ใส่_URL_WEB_APP_ของคุณที่นี่') return;
      try {
        const response = await fetch(SCRIPT_URL);
        const data = await response.json();
        
        if(data.status === "success") {
          // แอนิเมชันตัวเลข
          animateValue("counter", 0, data.total, 1500); 
          
          // แสดงข้อความวิ่ง
          if(data.vows && data.vows.length > 0) {
            const vowList = document.getElementById("vowList");
            document.getElementById("marqueeBox").style.display = "block";
            
            let htmlString = "";
            data.vows.forEach(vow => {
              htmlString += `<div class="vow-item">🙏 ${vow.name} : <span>"${vow.expectation}"</span></div>`;
            });
            vowList.innerHTML = htmlString;
          }
        }
      } catch (error) {
        console.error("ดึงข้อมูลสถิติไม่สำเร็จ:", error);
      }
    }

    function animateValue(id, start, end, duration) {
      if (start === end) { document.getElementById(id).innerHTML = end; return; }
      let range = end - start;
      let current = start;
      let increment = end > start ? 1 : -1;
      let stepTime = Math.abs(Math.floor(duration / range));
      let obj = document.getElementById(id);
      let timer = setInterval(function() {
        current += increment;
        obj.innerHTML = current;
        if (current == end) clearInterval(timer);
      }, stepTime);
    }

    // เรียกใช้เมื่อเปิดหน้าเว็บ
    window.onload = fetchStats;

    // ==========================================
    // 4. ฟังก์ชันจัดการการส่งฟอร์ม (Submit)
    // ==========================================
    document.getElementById('vowForm').addEventListener('submit', async function(e) {
      e.preventDefault(); // ป้องกันการรีเฟรชหน้า
      
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.innerText = "กำลังบันทึกข้อมูลและสร้างเกียรติบัตร...";

      // รวบรวมข้อมูลจากฟอร์ม
      const formData = new FormData(this);
      const data = Object.fromEntries(formData.entries());
      
      // นำวันที่เริ่มต้นไปต่อท้ายระยะเวลา เพื่อให้โค้ด Apps Script เดิมทำงานได้ปกติโดยไม่ต้องแก้หลังบ้าน
      data.duration = `${data.duration} (เริ่ม: ${data.startDate})`;

      try {
        // ส่งข้อมูลแบบ POST (ใช้ mode: 'no-cors' เพื่อเลี่ยงปัญหา Cross-Origin ในบางเบราว์เซอร์ หากไม่ได้ตั้ง Headers ฝั่งเซิร์ฟเวอร์ไว้)
        await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(data)
        });
        
        // แจ้งเตือนเมื่อสำเร็จ
        Swal.fire({
          icon: 'success',
          title: 'อนุโมทนาบุญ',
          text: 'บันทึกข้อมูลเรียบร้อยแล้ว ระบบได้จัดส่งเกียรติบัตรไปยังอีเมลของคุณ',
          confirmButtonColor: '#e65100'
        });

        this.reset(); // ล้างข้อมูลในฟอร์ม
        fetchStats(); // อัปเดตสถิติทันที

      } catch (error) {
        Swal.fire({
          icon: 'error',
          title: 'เกิดข้อผิดพลาด',
          text: 'ไม่สามารถบันทึกข้อมูลได้ กรุณาลองใหม่อีกครั้ง',
          confirmButtonColor: '#e65100'
        });
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = "🙏 ยืนยันการตั้งสัจจะอธิษฐาน";
      }
    });
  </script>
</body>
</html>
